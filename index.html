<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogo do Amor 💜</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b001a;
    color:white;
    overflow:hidden;
    text-align:center;
}

/* ===== TELAS ===== */
.tela{
    display:none;
    height:100vh;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

#gameScreen{
    display:flex;
}

/* ===== GAME ===== */
#gameArea{
    position:relative;
    width:100%;
    height:100vh;
}

/* nave */
#ship{
    position:absolute;
    bottom:120px;
    left:50%;
    font-size:40px;
    transform:translateX(-50%);
}

/* inimigos */
.enemy{
    position:absolute;
    font-size:30px;
}

/* tiro */
.bullet{
    position:absolute;
    width:5px;
    height:15px;
    background:white;
}

/* HUD */
#hud{
    position:absolute;
    top:10px;
    left:10px;
}

/* joystick */
#joystick{
    position:fixed;
    bottom:30px;
    left:30px;
    width:120px;
    height:120px;
    background:rgba(255,255,255,0.1);
    border-radius:50%;
}

#stick{
    width:50px;
    height:50px;
    background:#a855f7;
    border-radius:50%;
    position:absolute;
    left:35px;
    top:35px;
}

/* botão tiro */
#shootBtn{
    position:fixed;
    bottom:40px;
    right:40px;
    width:80px;
    height:80px;
    background:#a855f7;
    border-radius:50%;
    font-size:30px;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 0 15px #a855f7;
}

/* ===== FINAL ===== */
#finalScreen{
    display:none;
    padding:20px;
}

/* timer */
#timer{
    margin:20px;
    font-size:18px;
}

/* mensagem */
#msg{
    font-size:20px;
    margin-top:20px;
}

/* estrelas cadentes */
#starsFinal{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    pointer-events:none;
}

.star{
    position:absolute;
    width:3px;
    height:3px;
    background:white;
    border-radius:50%;
    box-shadow:0 0 10px white;
    animation:fall 1.5s linear forwards;
}

@keyframes fall{
    from{transform:translate(0,0);opacity:1;}
    to{transform:translate(300px,600px);opacity:0;}
}
</style>
</head>

<body>

<!-- ===== GAME ===== -->
<div id="gameScreen" class="tela" style="display:flex;">

<div id="gameArea">
    <div id="hud">Pontos: <span id="points">0</span></div>
    <div id="ship">🚀</div>
</div>

</div>

<!-- joystick -->
<div id="joystick">
    <div id="stick"></div>
</div>

<!-- tiro -->
<div id="shootBtn" onclick="shoot()">🔫</div>

<!-- ===== FINAL ===== -->
<div id="finalScreen" class="tela">

<h1>💜 Você chegou no final 💜</h1>

<div id="timer"></div>

<h3 id="msg"></h3>

<div id="starsFinal"></div>

</div>

<script>

let ship = document.getElementById("ship");
let points = 0;

/* ===== JOYSTICK ===== */
let joystick = document.getElementById("joystick");
let stick = document.getElementById("stick");

let dragging=false;

joystick.addEventListener("touchstart",()=>dragging=true);

joystick.addEventListener("touchend",()=>{
    dragging=false;
    stick.style.left="35px";
});

joystick.addEventListener("touchmove",(e)=>{
    if(!dragging) return;

    let t=e.touches[0];
    let r=joystick.getBoundingClientRect();

    let x=t.clientX - r.left - 60;

    stick.style.left=(x+35)+"px";

    ship.style.left=(ship.offsetLeft + x*0.05)+"px";
});

/* ===== TIRO ===== */
function shoot(){

    const bullet=document.createElement("div");
    bullet.className="bullet";

    let r=ship.getBoundingClientRect();

    bullet.style.left=r.left+20+"px";
    bullet.style.top=r.top+"px";

    document.body.appendChild(bullet);

    let move=setInterval(()=>{

        bullet.style.top=bullet.offsetTop-10+"px";

        document.querySelectorAll(".enemy").forEach(e=>{
            if(hit(bullet,e)){
                e.remove();
                bullet.remove();

                points++;
                document.getElementById("points").innerText=points;

                if(points===5){
                    goFinal();
                }
            }
        });

    },20);
}

/* colisão */
function hit(a,b){
    let r1=a.getBoundingClientRect();
    let r2=b.getBoundingClientRect();

    return !(r1.right<r2.left || r1.left>r2.right || r1.bottom<r2.top || r1.top>r2.bottom);
}

/* inimigos */
function spawn(){

    setInterval(()=>{

        let e=document.createElement("div");
        e.className="enemy";
        e.innerHTML="👾";

        e.style.left=Math.random()*window.innerWidth+"px";
        e.style.top="0px";

        document.body.appendChild(e);

        let fall=setInterval(()=>{

            e.style.top=e.offsetTop+4+"px";

            if(e.offsetTop>window.innerHeight){
                e.remove();
                clearInterval(fall);
            }

        },30);

    },1000);
}

spawn();

/* ===== FINAL ===== */
const mensagens=[
"Você não venceu o jogo... você venceu meu coração 💜",
"Cada segundo com você vale mais que qualquer vitória",
"Se isso é um jogo, você já é meu final feliz",
"Eu te escolheria em qualquer universo",
"Obrigado por existir 💜"
];

let i=0;

function goFinal(){

    document.getElementById("gameScreen").style.display="none";
    document.getElementById("joystick").style.display="none";
    document.getElementById("shootBtn").style.display="none";

    document.getElementById("finalScreen").style.display="flex";

    startTimer();
    startMessages();
    startStars();
}

/* TIMER */
const startDate=new Date("2025-12-28T00:00:00");

function startTimer(){

    setInterval(()=>{

        let now=new Date();
        let diff=now-startDate;

        let d=Math.floor(diff/(1000*60*60*24));
        let h=Math.floor(diff/(1000*60*60)%24);
        let m=Math.floor(diff/(1000*60)%60);
        let s=Math.floor(diff/1000%60);

        document.getElementById("timer").innerHTML=
        `💜 Juntos há: ${d}d ${h}h ${m}m ${s}s`;

    },1000);
}

/* MENSAGENS */
function startMessages(){

    setInterval(()=>{

        document.getElementById("msg").innerHTML=mensagens[i];

        i++;
        if(i>=mensagens.length) i=0;

    },3000);
}

/* ESTRELAS CADENTES */
function star(){

    let s=document.createElement("div");
    s.className="star";

    s.style.left=Math.random()*window.innerWidth+"px";
    s.style.top=Math.random()*window.innerHeight/2+"px";

    document.getElementById("starsFinal").appendChild(s);

    setTimeout(()=>s.remove(),1500);
}

function startStars(){
    setInterval(star,500);
}

</script>

</body>
</html>
